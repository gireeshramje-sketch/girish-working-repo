name: Create Daily Activity Log

on:
  schedule:
    # Runs every day at 5:00 AM IST (11:30 PM UTC previous day)
    - cron: '30 23 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  create-log:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date (IST)
        id: date
        run: |
          # Get current date in IST (UTC+5:30)
          DATE=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          DISPLAY_DATE=$(TZ='Asia/Kolkata' date '+%-d %B %Y')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "display_date=$DISPLAY_DATE" >> $GITHUB_OUTPUT

      - name: Create daily log file
        run: |
          DATE="${{ steps.date.outputs.date }}"
          DISPLAY_DATE="${{ steps.date.outputs.display_date }}"
          FILE="daily_activity_log/${DATE}.md"

          if [ -f "$FILE" ]; then
            echo "Log file for $DATE already exists. Skipping."
            exit 0
          fi

          cat > "$FILE" << EOF
          # Daily Activity Log — ${DISPLAY_DATE}

          **Organisation Context:** Katyayani Organics | Gelheri Organics | Vijya Organics

          ---

          ## Activities

          <!-- Activities will be logged here during the day -->

          ---

          ## Zoho Books — Daily Summary

          | Category | KO | GO | VO |
          |---|---|---|---|
          | Revenue | | | |
          | Customer Payment Received | | | |
          | Payment Made | | | |
          | Advance Payment Done | | | |
          | Fixed Assets | | | |
          | Other Entries | | | |

          ---

          *Log maintained by Claude Code assistant*
          EOF

          echo "Created $FILE"

      - name: Commit and push
        run: |
          DATE="${{ steps.date.outputs.date }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_activity_log/
          git diff --staged --quiet || git commit -m "chore: add daily activity log for ${DATE}"
          git push
